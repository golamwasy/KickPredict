version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kickpredict_db
    environment:
      POSTGRES_USER: kickpredict
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kickpredict_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

